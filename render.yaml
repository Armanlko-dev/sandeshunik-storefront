# Render Blueprint — deploys the storefront as a static site.
# In Render: New → Blueprint → point at this repo (root: react-app).
services:
  - type: web
    name: sandeshunik-storefront
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # SPA fallback so deep links like /product/n1 resolve to index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_VERSION
        value: '20'
